<svg width="1900" height="980" viewBox="0 0 1900 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1900" height="980" fill="#0B0F1A"></rect>

  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"></stop>
      <stop offset="100%" stop-color="#DC2626"></stop>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"></stop>
      <stop offset="100%" stop-color="#1D4ED8"></stop>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"></stop>
      <stop offset="100%" stop-color="#059669"></stop>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"></stop>
      <stop offset="100%" stop-color="#6D28D9"></stop>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.26"></feDropShadow>
    </filter>

    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#60A5FA"></path>
    </marker>
    <marker id="arrowOrange" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#FB923C"></path>
    </marker>
    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#34D399"></path>
    </marker>
    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#C4B5FD"></path>
    </marker>
  </defs>

  <text x="950" y="58" text-anchor="middle" fill="white" font-size="38" font-family="Arial" font-weight="700">
    EmberSensor Low-Level Design
  </text>
  <text x="950" y="96" text-anchor="middle" fill="#B7C0D1" font-size="20" font-family="Arial">
    Detailed view of sensors, APIs, caching, and client applications
  </text>

  <!-- Sensors -->
  <g filter="url(#shadow)">
    <rect x="70" y="170" rx="30" ry="30" width="400" height="510" fill="#121827" stroke="#FB923C" stroke-width="2"></rect>
    <rect x="110" y="205" rx="18" ry="18" width="320" height="58" fill="url(#orangeGrad)"></rect>
    <text x="270" y="242" text-anchor="middle" fill="white" font-size="28" font-family="Arial" font-weight="700">
      Arduino IoT Prototype
    </text>

    <rect x="110" y="300" rx="18" ry="18" width="320" height="70" fill="#181F2E" stroke="#374151"></rect>
    <text x="270" y="343" text-anchor="middle" fill="#E5E7EB" font-size="22" font-family="Arial">Temperature Sensor</text>

    <rect x="110" y="400" rx="18" ry="18" width="320" height="70" fill="#181F2E" stroke="#374151"></rect>
    <text x="270" y="443" text-anchor="middle" fill="#E5E7EB" font-size="22" font-family="Arial">Smoke Sensor</text>

    <rect x="110" y="500" rx="18" ry="18" width="320" height="70" fill="#181F2E" stroke="#374151"></rect>
    <text x="270" y="543" text-anchor="middle" fill="#E5E7EB" font-size="22" font-family="Arial">Flame / Ember Sensor</text>

    <rect x="110" y="600" rx="18" ry="18" width="320" height="50" fill="#1B2437" stroke="#4B5563"></rect>
    <text x="270" y="632" text-anchor="middle" fill="#FED7AA" font-size="20" font-family="Arial">
      POST /api/update
    </text>
  </g>

  <!-- Cloud -->
  <g filter="url(#shadow)">
    <rect x="610" y="130" rx="34" ry="34" width="670" height="620" fill="#121827" stroke="#60A5FA" stroke-width="2"></rect>
    <rect x="660" y="168" rx="20" ry="20" width="570" height="62" fill="url(#blueGrad)"></rect>
    <text x="945" y="208" text-anchor="middle" fill="white" font-size="30" font-family="Arial" font-weight="700">
      Cloudflare Worker Backend
    </text>

    <rect x="670" y="280" rx="18" ry="18" width="250" height="62" fill="#17233A" stroke="#3B82F6"></rect>
    <text x="795" y="319" text-anchor="middle" fill="#DBEAFE" font-size="22" font-family="Arial">
      FIRE_DATA KV
    </text>

    <rect x="970" y="280" rx="18" ry="18" width="250" height="62" fill="#17233A" stroke="#3B82F6"></rect>
    <text x="1095" y="319" text-anchor="middle" fill="#DBEAFE" font-size="22" font-family="Arial">
      WEATHER_CACHE KV
    </text>

    <rect x="670" y="385" rx="18" ry="18" width="250" height="62" fill="#17233A" stroke="#3B82F6"></rect>
    <text x="795" y="424" text-anchor="middle" fill="#DBEAFE" font-size="22" font-family="Arial">
      FIRMS_CACHE KV
    </text>

    <rect x="970" y="385" rx="18" ry="18" width="250" height="62" fill="#17233A" stroke="#3B82F6"></rect>
    <text x="1095" y="424" text-anchor="middle" fill="#DBEAFE" font-size="22" font-family="Arial">
      /api/status
    </text>

    <rect x="670" y="490" rx="18" ry="18" width="250" height="62" fill="#17233A" stroke="#3B82F6"></rect>
    <text x="795" y="529" text-anchor="middle" fill="#DBEAFE" font-size="22" font-family="Arial">
      /api/fires
    </text>

    <rect x="970" y="490" rx="18" ry="18" width="250" height="62" fill="#17233A" stroke="#3B82F6"></rect>
    <text x="1095" y="529" text-anchor="middle" fill="#DBEAFE" font-size="22" font-family="Arial">
      Risk Engine
    </text>

    <rect x="760" y="610" rx="18" ry="18" width="370" height="72" fill="#1A2841" stroke="#60A5FA"></rect>
    <text x="945" y="652" text-anchor="middle" fill="#E5E7EB" font-size="22" font-family="Arial">
      Website + API hosting at embersensor.com
    </text>
  </g>

  <!-- external -->
  <g filter="url(#shadow)">
    <rect x="1380" y="170" rx="28" ry="28" width="360" height="150" fill="#121827" stroke="#34D399" stroke-width="2"></rect>
    <rect x="1415" y="200" rx="16" ry="16" width="290" height="52" fill="url(#greenGrad)"></rect>
    <text x="1560" y="233" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      OpenWeather API
    </text>
    <text x="1560" y="285" text-anchor="middle" fill="#D1FAE5" font-size="18" font-family="Arial">
      Weather data for risk analysis
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1380" y="390" rx="28" ry="28" width="360" height="150" fill="#121827" stroke="#14B8A6" stroke-width="2"></rect>
    <rect x="1415" y="420" rx="16" ry="16" width="290" height="52" fill="#0F766E"></rect>
    <text x="1560" y="453" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      FIRMS Hotspot Data
    </text>
    <text x="1560" y="505" text-anchor="middle" fill="#CCFBF1" font-size="18" font-family="Arial">
      Nearby fire activity and map points
    </text>
  </g>

  <!-- clients -->
  <g filter="url(#shadow)">
    <rect x="1380" y="650" rx="28" ry="28" width="360" height="220" fill="#121827" stroke="#A78BFA" stroke-width="2"></rect>
    <rect x="1415" y="682" rx="16" ry="16" width="290" height="52" fill="url(#purpleGrad)"></rect>
    <text x="1560" y="715" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      Client Applications
    </text>

    <text x="1560" y="772" text-anchor="middle" fill="#E9D5FF" font-size="18" font-family="Arial">
      Website live status button
    </text>
    <text x="1560" y="804" text-anchor="middle" fill="#E9D5FF" font-size="18" font-family="Arial">
      Website live camera button
    </text>
    <text x="1560" y="836" text-anchor="middle" fill="#E9D5FF" font-size="18" font-family="Arial">
      iPhone app status + map tabs
    </text>
  </g>

  <!-- arrows -->
  <line x1="470" y1="625" x2="610" y2="625" stroke="#FB923C" stroke-width="6" marker-end="url(#arrowOrange)"></line>
  <text x="540" y="602" text-anchor="middle" fill="#FED7AA" font-size="16" font-family="Arial">sensor update</text>

  <line x1="1280" y1="245" x2="1380" y2="245" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"></line>
  <text x="1330" y="223" text-anchor="middle" fill="#A7F3D0" font-size="16" font-family="Arial">weather fetch</text>

  <line x1="1280" y1="465" x2="1380" y2="465" stroke="#2DD4BF" stroke-width="6" marker-end="url(#arrowGreen)"></line>
  <text x="1330" y="443" text-anchor="middle" fill="#99F6E4" font-size="16" font-family="Arial">FIRMS fetch</text>

  <line x1="1280" y1="760" x2="1380" y2="760" stroke="#C4B5FD" stroke-width="6" marker-end="url(#arrowPurple)"></line>
  <text x="1330" y="738" text-anchor="middle" fill="#DDD6FE" font-size="16" font-family="Arial">API access</text>
</svg>