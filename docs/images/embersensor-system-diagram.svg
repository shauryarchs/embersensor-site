<svg width="1700" height="560" viewBox="0 0 1700 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1700" height="560" fill="#0B0F1A"></rect>

  <defs>
    <linearGradient id="iotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"></stop>
      <stop offset="100%" stop-color="#DC2626"></stop>
    </linearGradient>

    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"></stop>
      <stop offset="100%" stop-color="#1D4ED8"></stop>
    </linearGradient>

    <linearGradient id="appGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"></stop>
      <stop offset="100%" stop-color="#059669"></stop>
    </linearGradient>

    <linearGradient id="siteGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"></stop>
      <stop offset="100%" stop-color="#6D28D9"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.30"></feDropShadow>
    </filter>

    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#60A5FA"></path>
    </marker>

    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#34D399"></path>
    </marker>

    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#A78BFA"></path>
    </marker>
  </defs>

  <text x="850" y="60" text-anchor="middle" fill="white" font-size="36" font-family="Arial" font-weight="700">
    EmberSensor High-Level Design
  </text>
  <text x="850" y="96" text-anchor="middle" fill="#B7C0D1" font-size="19" font-family="Arial">
    Simple view of the main parts of the system
  </text>

  <!-- IoT -->
  <g filter="url(#shadow)">
    <rect x="80" y="170" rx="28" ry="28" width="320" height="230" fill="#121827" stroke="#FB923C" stroke-width="2"></rect>
    <rect x="108" y="198" rx="16" ry="16" width="264" height="54" fill="url(#iotGrad)"></rect>
    <text x="240" y="232" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      IoT Device
    </text>

    <text x="240" y="288" text-anchor="middle" fill="#FED7AA" font-size="19" font-family="Arial" font-weight="700">
      Arduino Uno Prototype
    </text>

    <text x="112" y="335" fill="#E5E7EB" font-size="18" font-family="Arial">• Temperature, smoke, and flame sensing</text>
    <text x="112" y="370" fill="#E5E7EB" font-size="18" font-family="Arial">• Reads local outdoor conditions</text>
  </g>

  <!-- Cloud -->
  <g filter="url(#shadow)">
    <rect x="530" y="130" rx="32" ry="32" width="560" height="310" fill="#121827" stroke="#60A5FA" stroke-width="2"></rect>
    <rect x="570" y="162" rx="18" ry="18" width="480" height="60" fill="url(#cloudGrad)"></rect>
    <text x="810" y="200" text-anchor="middle" fill="white" font-size="28" font-family="Arial" font-weight="700">
      Cloud Platform
    </text>

    <text x="810" y="264" text-anchor="middle" fill="#DBEAFE" font-size="21" font-family="Arial" font-weight="700">
      Cloudflare Website + APIs
    </text>

    <text x="575" y="318" fill="#E5E7EB" font-size="19" font-family="Arial">• Receives sensor data from the IoT device</text>
    <text x="575" y="356" fill="#E5E7EB" font-size="19" font-family="Arial">• Combines weather and wildfire hotspot data</text>
    <text x="575" y="394" fill="#E5E7EB" font-size="19" font-family="Arial">• Computes live fire risk and serves APIs</text>
  </g>

  <!-- iOS -->
  <g filter="url(#shadow)">
    <rect x="1290" y="90" rx="28" ry="28" width="320" height="170" fill="#121827" stroke="#34D399" stroke-width="2"></rect>
    <rect x="1318" y="118" rx="16" ry="16" width="264" height="52" fill="url(#appGrad)"></rect>
    <text x="1450" y="151" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      iOS App
    </text>

    <text x="1450" y="206" text-anchor="middle" fill="#D1FAE5" font-size="18" font-family="Arial">
      Status, map, and notifications
    </text>
    <text x="1450" y="234" text-anchor="middle" fill="#D1FAE5" font-size="18" font-family="Arial">
      powered by live APIs
    </text>
  </g>

  <!-- Website -->
  <g filter="url(#shadow)">
    <rect x="1290" y="300" rx="28" ry="28" width="320" height="170" fill="#121827" stroke="#A78BFA" stroke-width="2"></rect>
    <rect x="1318" y="328" rx="16" ry="16" width="264" height="52" fill="url(#siteGrad)"></rect>
    <text x="1450" y="361" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      Website
    </text>

    <text x="1450" y="416" text-anchor="middle" fill="#E9D5FF" font-size="18" font-family="Arial">
      embersensor.com
    </text>
    <text x="1450" y="444" text-anchor="middle" fill="#E9D5FF" font-size="18" font-family="Arial">
      live status and camera access
    </text>
  </g>

  <!-- Arrows -->
  <line x1="400" y1="285" x2="530" y2="285" stroke="#60A5FA" stroke-width="6" marker-end="url(#arrowBlue)"></line>
  <text x="465" y="262" text-anchor="middle" fill="#BFDBFE" font-size="16" font-family="Arial">
    sensor data
  </text>

  <line x1="1090" y1="185" x2="1290" y2="185" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"></line>
  <text x="1190" y="162" text-anchor="middle" fill="#A7F3D0" font-size="16" font-family="Arial">
    live APIs
  </text>

  <line x1="1090" y1="385" x2="1290" y2="385" stroke="#A78BFA" stroke-width="6" marker-end="url(#arrowPurple)"></line>
  <text x="1190" y="362" text-anchor="middle" fill="#DDD6FE" font-size="16" font-family="Arial">
    website data
  </text>
</svg>