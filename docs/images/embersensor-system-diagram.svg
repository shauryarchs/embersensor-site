<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#0B0F1A"></rect>

  <defs>
    <linearGradient id="cardDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#182033"></stop>
      <stop offset="100%" stop-color="#101726"></stop>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EA580C"></stop>
      <stop offset="100%" stop-color="#DC2626"></stop>
    </linearGradient>

    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"></stop>
      <stop offset="100%" stop-color="#1D4ED8"></stop>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"></stop>
      <stop offset="100%" stop-color="#059669"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"></feDropShadow>
    </filter>

    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#F97316"></path>
    </marker>

    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3B82F6"></path>
    </marker>

    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#10B981"></path>
    </marker>
  </defs>

  <text x="600" y="60" text-anchor="middle" fill="white" font-size="34" font-family="Arial" font-weight="700">
    EmberSensor Overall System Design
  </text>
  <text x="600" y="95" text-anchor="middle" fill="#B7C0D1" font-size="18" font-family="Arial">
    IoT sensing, cloud APIs, and mobile monitoring working together
  </text>

  <!-- Arduino / IoT -->
  <g filter="url(#shadow)">
    <rect x="70" y="180" rx="24" ry="24" width="300" height="310" fill="url(#cardDark)" stroke="#F97316" stroke-width="2"></rect>
    <rect x="95" y="205" rx="14" ry="14" width="250" height="48" fill="url(#orangeGrad)"></rect>
    <text x="220" y="236" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      IoT Device
    </text>

    <text x="220" y="285" text-anchor="middle" fill="#FFD7BF" font-size="20" font-family="Arial" font-weight="700">
      Arduino Uno Prototype
    </text>

    <text x="110" y="330" fill="#E5E7EB" font-size="18" font-family="Arial">• Reads temperature sensor</text>
    <text x="110" y="365" fill="#E5E7EB" font-size="18" font-family="Arial">• Reads smoke sensor</text>
    <text x="110" y="400" fill="#E5E7EB" font-size="18" font-family="Arial">• Reads flame / ember signal</text>
    <text x="110" y="435" fill="#E5E7EB" font-size="18" font-family="Arial">• Sends local readings to cloud</text>
    <text x="110" y="470" fill="#E5E7EB" font-size="18" font-family="Arial">• Can trigger sprinkler response</text>
  </g>

  <!-- Cloudflare -->
  <g filter="url(#shadow)">
    <rect x="450" y="120" rx="28" ry="28" width="320" height="430" fill="url(#cardDark)" stroke="#3B82F6" stroke-width="2"></rect>
    <rect x="480" y="150" rx="14" ry="14" width="260" height="52" fill="url(#blueGrad)"></rect>
    <text x="610" y="183" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      Web Server / Cloud APIs
    </text>

    <text x="610" y="235" text-anchor="middle" fill="#CFE1FF" font-size="20" font-family="Arial" font-weight="700">
      Cloudflare Worker + Website
    </text>

    <text x="480" y="285" fill="#E5E7EB" font-size="18" font-family="Arial">• Stores latest sensor readings</text>
    <text x="480" y="320" fill="#E5E7EB" font-size="18" font-family="Arial">• Fetches live weather data</text>
    <text x="480" y="355" fill="#E5E7EB" font-size="18" font-family="Arial">• Fetches wildfire hotspot data</text>
    <text x="480" y="390" fill="#E5E7EB" font-size="18" font-family="Arial">• Computes fire risk status</text>
    <text x="480" y="425" fill="#E5E7EB" font-size="18" font-family="Arial">• Serves website and APIs</text>

    <rect x="490" y="455" rx="14" ry="14" width="240" height="34" fill="#132238" stroke="#2D5BBA"></rect>
    <text x="610" y="477" text-anchor="middle" fill="#D6E4FF" font-size="16" font-family="Courier New">
      embersensor.com/api/status
    </text>

    <rect x="490" y="500" rx="14" ry="14" width="240" height="34" fill="#132238" stroke="#2D5BBA"></rect>
    <text x="610" y="522" text-anchor="middle" fill="#D6E4FF" font-size="16" font-family="Courier New">
      embersensor.com/api/fires
    </text>
  </g>

  <!-- iOS App -->
  <g filter="url(#shadow)">
    <rect x="850" y="180" rx="24" ry="24" width="280" height="310" fill="url(#cardDark)" stroke="#10B981" stroke-width="2"></rect>
    <rect x="875" y="205" rx="14" ry="14" width="230" height="48" fill="url(#greenGrad)"></rect>
    <text x="990" y="236" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      iOS App
    </text>

    <text x="990" y="285" text-anchor="middle" fill="#CFFCEB" font-size="20" font-family="Arial" font-weight="700">
      EmberSensor Mobile App
    </text>

    <text x="885" y="330" fill="#E5E7EB" font-size="18" font-family="Arial">• Reads live risk status</text>
    <text x="885" y="365" fill="#E5E7EB" font-size="18" font-family="Arial">• Shows nearby fire map</text>
    <text x="885" y="400" fill="#E5E7EB" font-size="18" font-family="Arial">• Displays weather conditions</text>
    <text x="885" y="435" fill="#E5E7EB" font-size="18" font-family="Arial">• Sends high-risk notification</text>
  </g>

  <!-- Website bubble -->
  <g filter="url(#shadow)">
    <rect x="470" y="590" rx="18" ry="18" width="280" height="60" fill="#111827" stroke="#374151"></rect>
    <text x="610" y="615" text-anchor="middle" fill="white" font-size="18" font-family="Arial" font-weight="700">
      embersensor.com
    </text>
    <text x="610" y="637" text-anchor="middle" fill="#B7C0D1" font-size="14" font-family="Arial">
      Static site + live monitoring links
    </text>
  </g>

  <!-- arrows -->
  <line x1="370" y1="335" x2="450" y2="335" stroke="#F97316" stroke-width="5" marker-end="url(#arrowOrange)"></line>
  <text x="410" y="318" text-anchor="middle" fill="#FDC59B" font-size="15" font-family="Arial">
    Sensor data upload
  </text>

  <line x1="770" y1="300" x2="850" y2="300" stroke="#3B82F6" stroke-width="5" marker-end="url(#arrowBlue)"></line>
  <text x="810" y="283" text-anchor="middle" fill="#CFE1FF" font-size="15" font-family="Arial">
    API responses
  </text>

  <line x1="990" y1="510" x2="990" y2="565" stroke="#10B981" stroke-width="5" marker-end="url(#arrowGreen)"></line>
  <line x1="990" y1="565" x2="700" y2="565" stroke="#10B981" stroke-width="5" marker-end="url(#arrowGreen)"></line>
  <text x="900" y="552" text-anchor="middle" fill="#CFFCEB" font-size="15" font-family="Arial">
    User monitoring and app access
  </text>
</svg>