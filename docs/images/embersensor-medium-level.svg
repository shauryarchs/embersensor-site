<svg width="1800" height="820" viewBox="0 0 1800 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1800" height="820" fill="#0B0F1A"></rect>

  <defs>
    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"></stop>
      <stop offset="100%" stop-color="#DC2626"></stop>
    </linearGradient>

    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"></stop>
      <stop offset="100%" stop-color="#1D4ED8"></stop>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"></stop>
      <stop offset="100%" stop-color="#059669"></stop>
    </linearGradient>

    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"></stop>
      <stop offset="100%" stop-color="#6D28D9"></stop>
    </linearGradient>

    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14B8A6"></stop>
      <stop offset="100%" stop-color="#0F766E"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"></feDropShadow>
    </filter>

    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#60A5FA"></path>
    </marker>

    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#34D399"></path>
    </marker>

    <marker id="arrowOrange" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#FB923C"></path>
    </marker>

    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#C4B5FD"></path>
    </marker>
  </defs>

  <text x="900" y="62" text-anchor="middle" fill="white" font-size="38" font-family="Arial" font-weight="700">
    EmberSensor Medium-Level Design
  </text>
  <text x="900" y="100" text-anchor="middle" fill="#B7C0D1" font-size="20" font-family="Arial">
    Cloud services combine local sensing with external fire and weather intelligence
  </text>

  <!-- Arduino -->
  <g filter="url(#shadow)">
    <rect x="80" y="250" rx="30" ry="30" width="360" height="240" fill="#121827" stroke="#FB923C" stroke-width="2"></rect>
    <rect x="112" y="282" rx="18" ry="18" width="296" height="58" fill="url(#orangeGrad)"></rect>
    <text x="260" y="319" text-anchor="middle" fill="white" font-size="26" font-family="Arial" font-weight="700">
      IoT Device
    </text>

    <text x="260" y="375" text-anchor="middle" fill="#FED7AA" font-size="20" font-family="Arial" font-weight="700">
      Arduino Uno + Sensors
    </text>

    <text x="118" y="420" fill="#E5E7EB" font-size="19" font-family="Arial">• Temperature sensor</text>
    <text x="118" y="455" fill="#E5E7EB" font-size="19" font-family="Arial">• Smoke sensor</text>
  </g>

  <!-- Cloud -->
  <g filter="url(#shadow)">
    <rect x="620" y="180" rx="34" ry="34" width="560" height="380" fill="#121827" stroke="#60A5FA" stroke-width="2"></rect>
    <rect x="660" y="214" rx="20" ry="20" width="480" height="62" fill="url(#blueGrad)"></rect>
    <text x="900" y="254" text-anchor="middle" fill="white" font-size="30" font-family="Arial" font-weight="700">
      Cloudflare Worker / Web Server
    </text>

    <text x="900" y="325" text-anchor="middle" fill="#DBEAFE" font-size="22" font-family="Arial" font-weight="700">
      Website + APIs + Risk Logic
    </text>

    <text x="675" y="385" fill="#E5E7EB" font-size="20" font-family="Arial">• Stores latest sensor readings</text>
    <text x="675" y="425" fill="#E5E7EB" font-size="20" font-family="Arial">• Reads weather and wildfire data</text>
    <text x="675" y="465" fill="#E5E7EB" font-size="20" font-family="Arial">• Computes risk score</text>
    <text x="675" y="505" fill="#E5E7EB" font-size="20" font-family="Arial">• Serves /api/status and /api/fires</text>
  </g>

  <!-- Weather API -->
  <g filter="url(#shadow)">
    <rect x="1320" y="120" rx="28" ry="28" width="320" height="150" fill="#121827" stroke="#34D399" stroke-width="2"></rect>
    <rect x="1350" y="148" rx="16" ry="16" width="260" height="50" fill="url(#greenGrad)"></rect>
    <text x="1480" y="180" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      Weather API
    </text>
    <text x="1480" y="230" text-anchor="middle" fill="#D1FAE5" font-size="18" font-family="Arial">
      Temperature, humidity,
    </text>
    <text x="1480" y="255" text-anchor="middle" fill="#D1FAE5" font-size="18" font-family="Arial">
      wind, rain conditions
    </text>
  </g>

  <!-- FIRMS -->
  <g filter="url(#shadow)">
    <rect x="1320" y="325" rx="28" ry="28" width="320" height="150" fill="#121827" stroke="#14B8A6" stroke-width="2"></rect>
    <rect x="1350" y="353" rx="16" ry="16" width="260" height="50" fill="url(#tealGrad)"></rect>
    <text x="1480" y="385" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      FIRMS Fire Data
    </text>
    <text x="1480" y="435" text-anchor="middle" fill="#CCFBF1" font-size="18" font-family="Arial">
      Nearby wildfire hotspots
    </text>
  </g>

  <!-- Clients -->
  <g filter="url(#shadow)">
    <rect x="1320" y="560" rx="28" ry="28" width="320" height="170" fill="#121827" stroke="#A78BFA" stroke-width="2"></rect>
    <rect x="1350" y="590" rx="16" ry="16" width="260" height="50" fill="url(#purpleGrad)"></rect>
    <text x="1480" y="622" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      Clients
    </text>
    <text x="1480" y="670" text-anchor="middle" fill="#E9D5FF" font-size="18" font-family="Arial">
      embersensor.com website
    </text>
    <text x="1480" y="698" text-anchor="middle" fill="#E9D5FF" font-size="18" font-family="Arial">
      and iPhone app
    </text>
  </g>

  <!-- arrows -->
  <line x1="440" y1="370" x2="620" y2="370" stroke="#FB923C" stroke-width="6" marker-end="url(#arrowOrange)"></line>
  <text x="530" y="347" text-anchor="middle" fill="#FED7AA" font-size="16" font-family="Arial">sensor readings</text>

  <line x1="1320" y1="195" x2="1180" y2="260" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"></line>
  <text x="1265" y="180" text-anchor="middle" fill="#A7F3D0" font-size="16" font-family="Arial">weather data</text>

  <line x1="1320" y1="400" x2="1180" y2="390" stroke="#2DD4BF" stroke-width="6" marker-end="url(#arrowGreen)"></line>
  <text x="1262" y="430" text-anchor="middle" fill="#99F6E4" font-size="16" font-family="Arial">fire hotspots</text>

  <line x1="1180" y1="610" x2="1320" y2="610" stroke="#C4B5FD" stroke-width="6" marker-end="url(#arrowPurple)"></line>
  <text x="1250" y="588" text-anchor="middle" fill="#DDD6FE" font-size="16" font-family="Arial">status and fire APIs</text>
</svg>