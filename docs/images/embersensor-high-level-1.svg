<svg width="1400" height="520" viewBox="0 0 1400 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="520" fill="#0B0F1A"></rect>

  <defs>
    <linearGradient id="iotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"></stop>
      <stop offset="100%" stop-color="#DC2626"></stop>
    </linearGradient>

    <linearGradient id="cloudGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"></stop>
      <stop offset="100%" stop-color="#1D4ED8"></stop>
    </linearGradient>

    <linearGradient id="appGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"></stop>
      <stop offset="100%" stop-color="#059669"></stop>
    </linearGradient>

    <linearGradient id="siteGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"></stop>
      <stop offset="100%" stop-color="#6D28D9"></stop>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000000" flood-opacity="0.30"></feDropShadow>
    </filter>

    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#60A5FA"></path>
    </marker>

    <marker id="arrowGreen" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#34D399"></path>
    </marker>

    <marker id="arrowPurple" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M0 0 L14 7 L0 14 Z" fill="#A78BFA"></path>
    </marker>
  </defs>

  <text x="700" y="58" text-anchor="middle" fill="white" font-size="34" font-family="Arial" font-weight="700">
    EmberSensor High-Level Design
  </text>
  <text x="700" y="92" text-anchor="middle" fill="#B7C0D1" font-size="18" font-family="Arial">
    Simple view of the main parts of the system
  </text>

  <!-- IoT -->
  <g filter="url(#shadow)">
    <rect x="70" y="160" rx="28" ry="28" width="300" height="220" fill="#121827" stroke="#FB923C" stroke-width="2"></rect>
    <rect x="95" y="186" rx="16" ry="16" width="250" height="52" fill="url(#iotGrad)"></rect>
    <text x="220" y="219" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      IoT Device
    </text>

    <text x="220" y="272" text-anchor="middle" fill="#FED7AA" font-size="18" font-family="Arial" font-weight="700">
      Arduino Uno Prototype
    </text>

    <text x="100" y="315" fill="#E5E7EB" font-size="17" font-family="Arial">• Temperature, smoke, and flame sensing</text>
    <text x="100" y="346" fill="#E5E7EB" font-size="17" font-family="Arial">• Reads local outdoor conditions</text>
  </g>

  <!-- Cloud -->
  <g filter="url(#shadow)">
    <rect x="450" y="120" rx="30" ry="30" width="500" height="300" fill="#121827" stroke="#60A5FA" stroke-width="2"></rect>
    <rect x="485" y="150" rx="18" ry="18" width="430" height="58" fill="url(#cloudGrad)"></rect>
    <text x="700" y="187" text-anchor="middle" fill="white" font-size="28" font-family="Arial" font-weight="700">
      Cloud Platform
    </text>

    <text x="700" y="246" text-anchor="middle" fill="#DBEAFE" font-size="20" font-family="Arial" font-weight="700">
      Cloudflare Website + APIs
    </text>

    <text x="505" y="294" fill="#E5E7EB" font-size="18" font-family="Arial">• Receives sensor data from the IoT device</text>
    <text x="505" y="329" fill="#E5E7EB" font-size="18" font-family="Arial">• Combines weather and wildfire hotspot data</text>
    <text x="505" y="364" fill="#E5E7EB" font-size="18" font-family="Arial">• Computes live fire risk and serves APIs</text>
  </g>

  <!-- iOS -->
  <g filter="url(#shadow)">
    <rect x="1030" y="90" rx="28" ry="28" width="300" height="160" fill="#121827" stroke="#34D399" stroke-width="2"></rect>
    <rect x="1055" y="116" rx="16" ry="16" width="250" height="50" fill="url(#appGrad)"></rect>
    <text x="1180" y="148" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      iOS App
    </text>

    <text x="1180" y="198" text-anchor="middle" fill="#D1FAE5" font-size="17" font-family="Arial">
      Status, map, and notifications
    </text>
    <text x="1180" y="225" text-anchor="middle" fill="#D1FAE5" font-size="17" font-family="Arial">
      powered by live APIs
    </text>
  </g>

  <!-- Website -->
  <g filter="url(#shadow)">
    <rect x="1030" y="290" rx="28" ry="28" width="300" height="160" fill="#121827" stroke="#A78BFA" stroke-width="2"></rect>
    <rect x="1055" y="316" rx="16" ry="16" width="250" height="50" fill="url(#siteGrad)"></rect>
    <text x="1180" y="348" text-anchor="middle" fill="white" font-size="24" font-family="Arial" font-weight="700">
      Website
    </text>

    <text x="1180" y="398" text-anchor="middle" fill="#E9D5FF" font-size="17" font-family="Arial">
      embersensor.com
    </text>
    <text x="1180" y="425" text-anchor="middle" fill="#E9D5FF" font-size="17" font-family="Arial">
      live status and camera access
    </text>
  </g>

  <!-- Arrows -->
  <line x1="370" y1="270" x2="450" y2="270" stroke="#60A5FA" stroke-width="6" marker-end="url(#arrowBlue)"></line>
  <text x="410" y="250" text-anchor="middle" fill="#BFDBFE" font-size="15" font-family="Arial">
    sensor data
  </text>

  <line x1="950" y1="190" x2="1030" y2="190" stroke="#34D399" stroke-width="6" marker-end="url(#arrowGreen)"></line>
  <text x="990" y="170" text-anchor="middle" fill="#A7F3D0" font-size="15" font-family="Arial">
    live APIs
  </text>

  <line x1="950" y1="370" x2="1030" y2="370" stroke="#A78BFA" stroke-width="6" marker-end="url(#arrowPurple)"></line>
  <text x="990" y="350" text-anchor="middle" fill="#DDD6FE" font-size="15" font-family="Arial">
    website data
  </text>
</svg>