<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Fire Map | EmberSensor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Live fire map showing nearby FIRMS satellite detections and CAL FIRE reported incidents." />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    .map-page {
      padding: 48px 0 72px;
    }

    .map-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .map-wrap {
      width: min(960px, 100%);
      margin: 0 auto;
    }

    #fire-map {
      width: 100%;
      height: 560px;
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow);
      background: #1a1f2e;
    }

    .map-counts {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .map-count-item {
      text-align: center;
      padding: 14px 22px;
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      backdrop-filter: blur(12px);
      min-width: 140px;
    }

    .map-count-item .num {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .map-count-item .label {
      font-size: 13px;
      color: var(--muted);
    }

    .map-count-item .num.firms-color   { color: #fb923c; }
    .map-count-item .num.calfire-color { color: #f87171; }

    .map-status {
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: rgba(183, 192, 209, 0.55);
      min-height: 20px;
    }

    .refresh-row {
      text-align: center;
      margin-top: 20px;
    }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    }

    /* Dark theme overrides for Leaflet controls */
    .leaflet-control-layers,
    .leaflet-control-zoom {
      background: rgba(18, 24, 39, 0.92) !important;
      border: 1px solid rgba(255, 255, 255, 0.14) !important;
      backdrop-filter: blur(10px);
      border-radius: 10px !important;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4) !important;
    }

    .leaflet-control-layers-expanded {
      padding: 10px 14px !important;
      min-width: 170px;
    }

    .leaflet-control-layers-base label,
    .leaflet-control-layers-overlays label {
      color: #d7deea !important;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
    }

    .leaflet-control-layers-separator {
      border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
      margin: 6px 0 !important;
    }

    .leaflet-control-zoom-in,
    .leaflet-control-zoom-out {
      color: #d7deea !important;
      background: transparent !important;
      border: none !important;
      font-size: 16px !important;
    }

    .leaflet-control-zoom-in:hover,
    .leaflet-control-zoom-out:hover {
      background: rgba(255, 255, 255, 0.1) !important;
      color: white !important;
    }

    .leaflet-control-zoom-disabled {
      color: rgba(255,255,255,0.25) !important;
    }

    .leaflet-control-attribution {
      background: rgba(0, 0, 0, 0.5) !important;
      color: rgba(255,255,255,0.4) !important;
      font-size: 10px !important;
    }

    .leaflet-control-attribution a {
      color: rgba(255,255,255,0.55) !important;
    }

    /* Distance label tooltips */
    .leaflet-tooltip.dist-label {
      background: rgba(18, 24, 39, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 6px;
      color: #d7deea;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 6px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }

    .leaflet-tooltip.dist-label.firms-tip {
      border-color: rgba(251, 146, 60, 0.5);
      color: #fed7aa;
    }

    .leaflet-tooltip.dist-label.calfire-tip {
      border-color: rgba(248, 113, 113, 0.5);
      color: #fca5a5;
    }

    .leaflet-tooltip.dist-label::before {
      display: none;
    }

    @media (max-width: 700px) {
      #fire-map { height: 420px; }
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <section class="map-page">
    <div class="container">
      <div class="map-header">
        <div class="eyebrow">Live Fire Map</div>
        <h1>Nearby Fire Activity</h1>
        <p class="section-sub">
          Showing FIRMS satellite heat detections and NIFC reported incidents within 25 miles of the sensor.
        </p>
      </div>

      <div class="map-wrap">
        <div class="map-counts">
          <div class="map-count-item">
            <div class="num firms-color" id="count-firms">—</div>
            <div class="label">FIRMS Detections</div>
          </div>
          <div class="map-count-item">
            <div class="num calfire-color" id="count-calfire">—</div>
            <div class="label">NIFC Incidents</div>
          </div>
        </div>

        <div id="fire-map" style="margin-top: 20px;"></div>

        <div class="map-status" id="map-status">Loading fire data…</div>

        <div class="refresh-row">
          <button class="refresh-btn" onclick="loadMapData()">⟳ Refresh</button>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="script.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const HOME_LAT = 34.1;
    const HOME_LON = -117.6;
    const RADIUS_DEG = 1.2;

    // --- Basemaps ---
    const basemaps = {
      "Street": L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
      }),
      "Satellite": L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
        attribution: '© <a href="https://www.esri.com">Esri</a>, Maxar, Earthstar Geographics',
        maxZoom: 19
      }),
      "Terrain": L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
        attribution: '© <a href="https://opentopomap.org">OpenTopoMap</a>, © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 17
      })
    };

    const map = L.map("fire-map", {
      zoomControl: true,
      layers: [basemaps["Street"]]
    }).setView([HOME_LAT, HOME_LON], 10);

    // --- Overlay layers ---
    const firmsLayer   = L.layerGroup();
    const calfireLayer = L.layerGroup();
    const radiusLayer  = L.layerGroup();

    // Home marker
    L.circleMarker([HOME_LAT, HOME_LON], {
      radius: 9,
      fillColor: "#60a5fa",
      color: "#93c5fd",
      weight: 2,
      fillOpacity: 0.95
    }).bindPopup("<strong>EmberSensor</strong><br>Sensor location").addTo(map);

    // 25-mile radius ring
    L.circle([HOME_LAT, HOME_LON], {
      radius: 25 * 1609.34,
      color: "rgba(255,255,255,0.25)",
      weight: 1.5,
      fill: false,
      dashArray: "4 6"
    }).addTo(radiusLayer);

    // Add all overlays to map by default
    firmsLayer.addTo(map);
    calfireLayer.addTo(map);
    radiusLayer.addTo(map);

    // --- Layer control (TOC) ---
    L.control.layers(basemaps, {
      "FIRMS Detections": firmsLayer,
      "NIFC Incidents":   calfireLayer,
      "25-mile Radius":   radiusLayer
    }, { position: "topright", collapsed: false }).addTo(map);

    // --- Data loading ---
    function setStatus(msg) {
      document.getElementById("map-status").textContent = msg;
    }

    function loadMapData() {
      firmsLayer.clearLayers();
      calfireLayer.clearLayers();
      setStatus("Loading fire data…");
      document.getElementById("count-firms").textContent = "—";
      document.getElementById("count-calfire").textContent = "—";

      const minLat = HOME_LAT - RADIUS_DEG;
      const maxLat = HOME_LAT + RADIUS_DEG;
      const minLon = HOME_LON - RADIUS_DEG;
      const maxLon = HOME_LON + RADIUS_DEG;

      const firmsPromise = fetch(
        `https://embersensor.com/api/fires?minLat=${minLat}&maxLat=${maxLat}&minLon=${minLon}&maxLon=${maxLon}`
      )
        .then(r => r.json())
        .then(data => {
          document.getElementById("count-firms").textContent = data.count ?? 0;
          (data.fires ?? []).forEach(f => {
            const marker = L.circleMarker([f.latitude, f.longitude], {
              radius: 6,
              fillColor: "#fb923c",
              color: "#fed7aa",
              weight: 1.5,
              fillOpacity: 0.85
            });

            marker.bindPopup(
              `<strong>FIRMS Detection</strong><br>` +
              `${f.distanceMiles} mi from sensor` +
              (f.confidence ? `<br>Confidence: ${f.confidence}` : "") +
              (f.satellite   ? `<br>Satellite: ${f.satellite}`   : "") +
              (f.acquiredDate ? `<br>Date: ${f.acquiredDate}`    : "")
            );

            marker.bindTooltip(`${f.distanceMiles} mi`, {
              permanent: true,
              direction: "right",
              offset: [8, 0],
              className: "dist-label firms-tip"
            });

            marker.addTo(firmsLayer);
          });
        });

      const calfirePromise = fetch("https://embersensor.com/api/calfire-fires")
        .then(r => r.json())
        .then(data => {
          document.getElementById("count-calfire").textContent = data.count ?? 0;
          (data.fires ?? []).forEach(f => {
            const popup = [
              `<strong>${f.name}</strong>`,
              `${f.distanceMiles} mi from sensor`,
              f.acresBurned      != null ? `${f.acresBurned.toLocaleString()} acres` : null,
              f.percentContained != null ? `${f.percentContained}% contained`        : null,
              f.state  ? f.state : null,
              f.updated ? `Updated: ${new Date(f.updated).toLocaleDateString()}` : null
            ].filter(Boolean).join("<br>");

            const marker = L.circleMarker([f.latitude, f.longitude], {
              radius: 10,
              fillColor: "#f87171",
              color: "#fca5a5",
              weight: 2,
              fillOpacity: 0.9
            });

            marker.bindPopup(popup);

            marker.bindTooltip(`${f.name} · ${f.distanceMiles} mi`, {
              permanent: true,
              direction: "right",
              offset: [12, 0],
              className: "dist-label calfire-tip"
            });

            marker.addTo(calfireLayer);
          });
        });

      Promise.all([firmsPromise, calfirePromise])
        .then(() => {
          const dt = new Date();
          setStatus("Updated " + dt.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" }));
        })
        .catch(() => {
          setStatus("Error loading fire data. Please try again.");
        });
    }

    loadMapData();
  </script>
</body>

</html>
