<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Live Camera | EmberSensor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Live camera feed for EmberSensor." />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .live-section {
      padding: 48px 0 64px;
    }

    .live-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .live-frame {
      max-width: 1100px;
      margin: 0 auto;
      background: #111;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      background: #000;
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .offline-box,
    .loading-box {
      max-width: 900px;
      margin: 0 auto;
      padding: 36px 24px;
      text-align: center;
      background: #fff7f2;
      border: 1px solid #f0d7c8;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .loading-box {
      background: #f8fafc;
      border-color: #dbe4ee;
    }

    .live-note {
      max-width: 900px;
      margin: 18px auto 0;
      text-align: center;
      opacity: 0.85;
    }

    .live-actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .live-link-btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid #ddd;
      background: white;
      color: inherit;
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <section class="live-section">
    <div class="container">
      <div class="live-header">
        <div class="eyebrow">Live Monitoring</div>
        <h1>EmberSensor Live Camera Feed</h1>
        <p>
          This page checks whether the EmberSensor YouTube channel is currently live.
        </p>
      </div>

      <div id="live-content">
        <div class="loading-box">
          <h2>Checking live stream status...</h2>
          <p>Please wait while we look for an active stream.</p>
        </div>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="script.js"></script>
  <script>
    const CHANNEL_ID = "UCvj9pFy7xF7Ecg6ji9gCKQg";
    const API_KEY = "YOUR_YOUTUBE_DATA_API_KEY";

    async function loadLiveStreamStatus() {
      const container = document.getElementById("live-content");

      const apiUrl =
        "https://www.googleapis.com/youtube/v3/search" +
        "?part=snippet" +
        "&channelId=" + CHANNEL_ID +
        "&eventType=live" +
        "&type=video" +
        "&maxResults=1" +
        "&key=" + API_KEY;

      try {
        const response = await fetch(apiUrl);
        const data = await response.json();

        if (data.items && data.items.length > 0) {
          const videoId = data.items[0].id.videoId;

          container.innerHTML = `
            <div class="live-frame">
              <div class="video-wrap">
                <iframe
                  src="https://www.youtube.com/embed/${videoId}?autoplay=1"
                  title="EmberSensor Live Camera"
                  allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                  allowfullscreen>
                </iframe>
              </div>
            </div>

            <p class="live-note">
              The live stream is currently active.
            </p>

            <div class="live-actions">
              <a class="live-link-btn" href="https://www.youtube.com/watch?v=${videoId}" target="_blank" rel="noopener noreferrer">
                Open on YouTube
              </a>
            </div>
          `;
        } else {
          container.innerHTML = `
            <div class="offline-box">
              <h2>The live stream is currently not on.</h2>
              <p>
                Please check back later when EmberSensor starts broadcasting again.
              </p>

              <div class="live-actions">
                <a class="live-link-btn" href="https://www.youtube.com/channel/${CHANNEL_ID}" target="_blank" rel="noopener noreferrer">
                  Visit YouTube Channel
                </a>
              </div>
            </div>
          `;
        }
      } catch (error) {
        container.innerHTML = `
          <div class="offline-box">
            <h2>Unable to check live stream status.</h2>
            <p>
              There was a problem checking YouTube right now. Please try again later.
            </p>

            <div class="live-actions">
              <a class="live-link-btn" href="https://www.youtube.com/channel/${CHANNEL_ID}" target="_blank" rel="noopener noreferrer">
                Visit YouTube Channel
              </a>
            </div>
          </div>
        `;
        console.error("Error checking YouTube live status:", error);
      }
    }

    loadLiveStreamStatus();
    setInterval(loadLiveStreamStatus, 60000);
  </script>
</body>

</html>
