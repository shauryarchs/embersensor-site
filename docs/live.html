<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Live Camera | EmberSensor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Live camera feed for EmberSensor." />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .live-section {
      padding: 48px 0 64px;
    }

    .live-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .live-card {
      max-width: 1100px;
      margin: 0 auto;
      border-radius: 18px;
      overflow: hidden;
      background: #111;
      color: #fff;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }

    .video-wrap {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      background: #000;
    }

    .video-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .live-message {
      padding: 40px 24px;
      text-align: center;
    }

    .live-message h2 {
      margin-bottom: 12px;
      color: #fff;
    }

    .live-message p {
      max-width: 760px;
      margin: 0 auto;
      color: #d7d7d7;
    }

    .live-actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 22px;
    }

    .live-btn {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      background: #fff;
      color: #111;
    }

    .live-note {
      text-align: center;
      margin-top: 18px;
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div id="site-header"></div>

  <section class="live-section">
    <div class="container">
      <div class="live-header">
        <div class="eyebrow">Live Monitoring</div>
        <h1>EmberSensor Live Camera Feed</h1>
        <p class="section-sub">
          Watch the live camera feed when streaming is active.
        </p>
      </div>

      <div id="live-container" class="live-card">
        <div class="live-message">
          <h2>Checking live stream status...</h2>
          <p>Please wait while EmberSensor checks whether the stream is currently active.</p>
        </div>
      </div>

      <p class="live-note">
        This page updates automatically and shows the live video only when the stream is on.
      </p>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="script.js"></script>
  <script>
    async function loadLiveStatus() {
      const container = document.getElementById("live-container");

      try {
        const response = await fetch("/api/youtube-live-status?ts=" + Date.now(), {
          cache: "no-store"
        });

        const data = await response.json();

        if (data.live && data.videoId) {
          container.innerHTML = `
            <div class="video-wrap">
              <iframe
                src="https://www.youtube.com/embed/${data.videoId}"
                title="${data.title || "EmberSensor Live Camera"}"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
              </iframe>
            </div>
          `;
        } else {
          container.innerHTML = `
            <div class="live-message">
              <h2>Live stream is currently not on</h2>
              <p>
                The EmberSensor camera feed is offline right now. Please check back when the next live session begins.
              </p>
              <div class="live-actions">
                <a class="live-btn" href="https://www.youtube.com/channel/UCvj9pFy7xF7Ecg6ji9gCKQg/live" target="_blank" rel="noopener noreferrer">
                  Open YouTube Live Page
                </a>
              </div>
            </div>
          `;
        }
      } catch (err) {
        container.innerHTML = `
          <div class="live-message">
            <h2>Unable to check live stream status</h2>
            <p>
              There was a problem checking the stream right now. Please try again shortly.
            </p>
          </div>
        `;
      }
    }

    loadLiveStatus();
    setInterval(loadLiveStatus, 30000);
  </script>
</body>

</html>
